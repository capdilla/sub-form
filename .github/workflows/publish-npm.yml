name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Enforce coverage threshold
        run: bun run test:coverage:ci
        env:
          COVERAGE_MIN: "90"

      - name: Build package
        run: bun run build

      - name: Publish to NPM
        run: bun npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
